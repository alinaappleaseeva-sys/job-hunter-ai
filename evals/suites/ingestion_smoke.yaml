# Ingestion smoke suite (Phase 8 + Wave 1 Web3/DAO expansion)
name: ingestion_smoke
version: "1.1"
phase: 8
description: Source-specific smoke checks for boards and Telegram. Records fetched, parse success, basic health. Includes Wave 1 cryptojobslist and expanded Telegram.

dataset:
  path: evals/datasets/ingestion/
  format: dir

gates:
  parse_rate:
    min: 0.8
  records_min:
    per_source:
      remoteok: 3
      weworkremotely: 3
      arcdev: 2
      wellfound: 2
      workable: 2
      solana: 2
      habr_career: 2
      hhru: 3
      telegram: 1
      cryptojobslist: 3  # Wave 1: cryptojobslist (main + dao/ops filters, RSS preferred)

ci:
  pytest_path: tests/unit/test_ingestion_smoke.py
  blocking: true
