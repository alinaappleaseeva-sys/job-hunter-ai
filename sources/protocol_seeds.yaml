# Protocol / DAO Career Pages, Governance Forums, Discords and Contributor Surfaces
# Used for targeted seeding of high-relevance sources for Head/Senior Ops + DAO/Gov/Treasury/Contributor roles in Web3.
# Format supports later crawling/scraping/monitoring.
# Types: careers_page, governance_forum, snapshot, discord, contributors, jobs_board, other

protocols:
  - name: Lido
    slug: lido
    website: https://lido.fi
    careers:
      - url: https://lido.fi/careers
        type: careers_page
        notes: Often posts ops, treasury, governance roles.
    governance:
      - url: https://research.lido.fi/
        type: governance_forum
        notes: Main forum for proposals, DAO Ops requests, contributor coordination.
      - url: https://snapshot.box/#/s:lido-snapshot.eth
        type: snapshot
        notes: On-chain voting, sometimes hiring-related proposals.
    discord: https://discord.gg/lido
    tags: [dao, treasury, governance, staking, ops]
    priority: high

